services:
  todoapp-postgres:
    image: postgres:18.1-bookworm
    container_name: todoapp-env-postgres
    environment:
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=${POSTGRES_DB}
    volumes:
        - ${PWD}/out/pgdata:/var/lib/postgresql
    restart: always

  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    env_file:
      - .env
    volumes:
        - ${PWD}/migrations:/migrations
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@todoapp-postgres:5432/${POSTGRES_DB}?sslmode=disable"
      - "up"
